SUPABASE_URL=your_supabase_url_here
SUPABASE_ANON_KEY=your_supabase_anon_key_here

# --- Optional DV7/libdovi spike flags ---
# Switch app build from prebuilt `app/libs/lib-exoplayer-release.aar` / `lib-ui-release.aar`
# to source-integrated Media3 from the local `media/` folder.
# USE_MEDIA3_SOURCE=true

# Enables dovi_bridge native build + runtime bridge loading.
DOVI_NATIVE_ENABLED=true

# Marks extractor hook integration as available in the current build.
DOVI_EXTRACTOR_HOOK_READY=true

# Enables linking a prebuilt libdovi static archive into dovi_bridge.
DOVI_ENABLE_REAL_LINK=true
# DOVI_LIBDOVI_STATIC_LIB=C:\\path\\to\\libdovi.a
# DOVI_LIBDOVI_INCLUDE_DIR=C:\\path\\to\\libdovi\\include
DOVI_LIBDOVI_PREBUILT_ROOT=third_party/libdovi
